<!DOCTYPE html>
<html>
<head>
    <title>Failed Login Logs</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #334155;
            padding: 10px;
        }

        th {
            background: #1e293b;
        }

        tr:nth-child(even) {
            background: #111827;
        }

        h1 {
            color: #38bdf8;
        }
    </style>
</head>

<body>

<h1>Failed Login Attempts</h1>

<table>
    <tr>
        <th>Username</th>
        <th>Time</th>
        <th>IP Address</th>
        <th>User Agent</th>
    </tr>

    {% for log in logs %}
    <tr>
        <td>{{ log[0] }}</td>
        <td>{{ log[1] }}</td>
        <td>{{ log[2] }}</td>
        <td>{{ log[3] }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
